services:
    #PHP Service
    app:
        build:
            context: ./docker
            dockerfile: Dockerfile
        restart: unless-stopped
        tty: true
        environment:
            SERVICE_NAME: app
            SERVICE_TAGS: dev
            DB_CONNECTION: mysql
            DB_HOST: db
            DB_PORT: 3306
            DB_DATABASE: live-grid
            DB_USERNAME: live-grid_user
            DB_PASSWORD: live-grid_pass
            PLAYWRIGHT_BROWSERS_PATH: /ms-playwright
        working_dir: /var/www
        volumes:
            - .:/var/www
            - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
            - playwright_cache:/ms-playwright
        depends_on:
            db:
                condition: service_healthy
            db_e2e:
                condition: service_healthy
        networks:
            - app_network

    #Nginx Service
    web:
        image: nginx:alpine
        restart: unless-stopped
        tty: true
        ports:
            - "80:80"
        volumes:
            - .:/var/www
            - ./docker/nginx/conf.d/:/etc/nginx/conf.d/
        networks:
            app_network:
                aliases:
                    - live-grid.lh

    #MySQL Service (dev + unit/functional tests with DAMA)
    db:
        image: mariadb:10.2.19
        restart: unless-stopped
        tty: true
        ports:
            - "3306:3306"
        environment:
            MYSQL_DATABASE: live-grid
            MYSQL_ROOT_PASSWORD: live-grid_root_pass
            MYSQL_USER: live-grid_user
            MYSQL_PASSWORD: live-grid_pass
            SERVICE_TAGS: dev
            SERVICE_NAME: mysql
        volumes:
            - dbdata:/var/lib/mysql
            - ./docker/mysql/my.cnf:/etc/mysql/my.cnf
        networks:
            - app_network
        healthcheck:
            test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "live-grid_user", "-plive-grid_pass"]
            interval: 10s
            timeout: 5s
            retries: 5

    #MySQL Service (Playwright E2E — no DAMA, committed writes survive reloads)
    db_e2e:
        image: mariadb:10.2.19
        restart: unless-stopped
        tty: true
        ports:
            - "3307:3306"
        environment:
            MYSQL_DATABASE: live-grid_e2e
            MYSQL_ROOT_PASSWORD: live-grid_root_pass
            MYSQL_USER: live-grid_user
            MYSQL_PASSWORD: live-grid_pass
            SERVICE_TAGS: dev
            SERVICE_NAME: mysql_e2e
        volumes:
            - dbdata_e2e:/var/lib/mysql
            - ./docker/mysql/my.cnf:/etc/mysql/my.cnf
        networks:
            - app_network
        healthcheck:
            test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "live-grid_user", "-plive-grid_pass"]
            interval: 10s
            timeout: 5s
            retries: 5

networks:
    app_network:
        driver: bridge

volumes:
    dbdata:
        driver: local
    dbdata_e2e:
        driver: local
    playwright_cache:
        driver: local
