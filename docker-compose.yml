services:
    #PHP Service
    app:
        build:
            context: ./docker
            dockerfile: Dockerfile
        restart: unless-stopped
        tty: true
        environment:
            SERVICE_NAME: app
            SERVICE_TAGS: dev
            DB_CONNECTION: mysql
            DB_HOST: db
            DB_PORT: 3306
            DB_DATABASE: live-grid
            DB_USERNAME: live-grid_user
            DB_PASSWORD: live-grid_pass
        working_dir: /var/www
        volumes:
            - .:/var/www
            - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
        depends_on:
            - db
        networks:
            - app_network

    #Nginx Service
    web:
        image: nginx:alpine
        restart: unless-stopped
        tty: true
        ports:
            - "80:80"
        volumes:
            - .:/var/www
            - ./docker/nginx/conf.d/:/etc/nginx/conf.d/
        networks:
            - app_network

    #MySQL Service
    db:
        image: mariadb:10.2.19
        restart: unless-stopped
        tty: true
        ports:
            - "3306:3306"
        environment:
            MYSQL_DATABASE: live-grid
            MYSQL_ROOT_PASSWORD: live-grid_root_pass
            MYSQL_USER: live-grid_user
            MYSQL_PASSWORD: live-grid_pass
            SERVICE_TAGS: dev
            SERVICE_NAME: mysql
        volumes:
            - dbdata:/var/lib/mysql
            - ./docker/mysql/my.cnf:/etc/mysql/my.cnf
        networks:
            - app_network
        healthcheck:
            test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "live-grid_user", "-plive-grid_pass"]
            interval: 10s
            timeout: 5s
            retries: 5

#Docker Networks
networks:
    app_network:
        driver: bridge

#Docker Volumes
volumes:
    dbdata:
        driver: local
