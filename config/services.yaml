# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

imports:
    - { resource: "UiBundle/services.yaml" }


# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    locale: 'en_GB'
    app.supported_locales: 'pl|en_GB'

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.
    _instanceof:
        Sylius\Bundle\ResourceBundle\Controller\ResourceController:
            autowire: false


    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'
    app.menu_builder:
        class: App\Component\Menu\Builder
        arguments: [ "@knp_menu.factory" ]

    app.admin_sidebar_menu:
        class: Knp\Menu\MenuItem
        factory: [ "@app.menu_builder", AdminSidebar ]
        arguments: [ "@request_stack" ]
        tags:
            - { name: knp_menu.menu, alias: admin_sidebar }

    app.admin_main_mobile_sidebar_menu:
        class: Knp\Menu\MenuItem
        factory: [ "@app.menu_builder", AdminMainMobileSidebar ]
        arguments: [ "@request_stack" ]
        tags:
            - { name: knp_menu.menu, alias: admin_main_mobile_sidebar }

    app.admin_mobile_sub_sidebar_menu:
        class: Knp\Menu\MenuItem
        factory: [ "@app.menu_builder", AdminMobileSubSidebar ]
        arguments: [ "@request_stack" ]
        tags:
            - { name: knp_menu.menu, alias: admin_mobile_sub_sidebar }

    App\Component\Grid\Service\GridLiveComponentService:
        arguments:
            $gridProvider: '@sylius.grid.chain_provider'


    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones
